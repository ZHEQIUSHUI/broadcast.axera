name: Docker Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - name: Build docker images (amd64/arm64) + export tar
        run: |
          set -euo pipefail
          IMAGE_NAME=broadcast-axera-dashboard
          IMAGE_TAG="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            IMAGE_TAG="latest"
          fi

          echo "[build] linux/amd64"
          TAR_AMD64="${IMAGE_NAME}-${IMAGE_TAG}-linux-amd64.tar"
          docker buildx build \
            --platform linux/amd64 \
            --build-arg DOWNLOAD_TOOLCHAINS=1 \
            -t "${IMAGE_NAME}:${IMAGE_TAG}" \
            --output "type=docker,dest=${TAR_AMD64}" \
            .
          gzip -c "${TAR_AMD64}" > "${TAR_AMD64}.gz"

          echo "[build] linux/arm64"
          TAR_ARM64="${IMAGE_NAME}-${IMAGE_TAG}-linux-arm64.tar"
          docker buildx build \
            --platform linux/arm64 \
            --build-arg DOWNLOAD_TOOLCHAINS=1 \
            -t "${IMAGE_NAME}:${IMAGE_TAG}" \
            --output "type=docker,dest=${TAR_ARM64}" \
            .
          gzip -c "${TAR_ARM64}" > "${TAR_ARM64}.gz"

      - uses: actions/upload-artifact@v6
        with:
          name: broadcast-axera-dashboard-linux-tars
          path: broadcast-axera-dashboard-*-linux-*.tar*
          if-no-files-found: error

      - name: Move tag "latest" to this commit
        if: github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f latest "${GITHUB_SHA}"
          git push -f origin latest

      - name: Publish "latest" Release asset (overwrite)
        if: github.ref == 'refs/heads/main'
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: latest
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: true
          artifacts: broadcast-axera-dashboard-latest-linux-*.tar*
          omitBodyDuringUpdate: true
